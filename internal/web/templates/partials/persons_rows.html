{{define "persons-rows"}}
{{range .Persons}}
<tr onclick="window.location='/persons/{{.ID}}'" style="cursor:pointer;">
  <td>{{.Name}}</td>
  <td>{{.NickName}}</td>
  <td>{{$bd := fmtBirthDate .BirthYear .BirthMonth .BirthDay}}{{if $bd}}{{$bd}}{{else}}<em>unknown</em>{{end}}</td>
</tr>
{{else}}
<tr><td colspan="3"><em>No results.</em></td></tr>
{{end}}
{{end}}
