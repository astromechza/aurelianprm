{{define "persons-rows"}}
{{range .Persons}}
<tr onclick="window.location='/persons/{{.ID}}'" style="cursor:pointer;">
  <td>{{.Name}}</td>
  <td>{{.NickName}}</td>
  <td>
    {{if .BirthYear}}{{.BirthYear}} / {{if .BirthMonth}}{{printf "%02d" .BirthMonth}}{{else}}<em>unknown</em>{{end}}
    {{else}}<em>unknown</em>{{end}}
  </td>
  <td>
    <button
      onclick="event.stopPropagation()"
      hx-delete="/persons/{{.ID}}"
      hx-confirm="Delete {{.Name}}? This cannot be undone."
      hx-target="closest tr"
      hx-swap="outerHTML"
      class="secondary outline"
    >Delete</button>
  </td>
</tr>
{{else}}
<tr><td colspan="4"><em>No results.</em></td></tr>
{{end}}
{{end}}
